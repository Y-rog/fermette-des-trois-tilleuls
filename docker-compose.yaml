services:
  # ── Application Spring Boot ──────────────────
  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fermetroistilleuls
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_DIR: /uploads/gites
    volumes:
      - /var/www/fermette/uploads:/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: always
  # ── PostgreSQL ───────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fermetroistilleuls
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d fermetroistilleuls" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
volumes:
  postgres_data: