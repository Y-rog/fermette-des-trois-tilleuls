<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    Fragment navbar
    Paramètre active : nom de la page courante
    ex: navbar('home'), navbar('gites'), navbar('activities')
-->
<nav th:fragment="navbar(active)"
     class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <!-- Logo alpaga dans un cercle + nom de la fermette -->
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <img th:src="@{/img/logo-icone.png}"
                 alt="Fermette des Trois Tilleuls"/>
            <img th:src="@{/img/logo-texte.png}"
                 alt="La Fermette des Trois Tilleuls"/>
        </a>

        <!-- Bouton hamburger mobile -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navMenu"
                aria-controls="navMenu"
                aria-expanded="false"
                aria-label="Ouvrir la navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Liens de navigation -->
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'home'} ? ' active'"
                       th:href="@{/}">
                        Accueil
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'gites'} ? ' active'"
                       th:href="@{/gites}">
                        Nos gîtes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'activities'} ? ' active'"
                       th:href="@{/activities}">
                        Activités
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'shop'} ? ' active'"
                       th:href="@{/shop}">
                        Magasin
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'contact'} ? ' active'"
                       th:href="@{/contact}">
                        Contact
                    </a>
                </li>
                <!-- Bouton Réserver -->
                <li class="nav-item ms-lg-2">
                    <a class="btn btn-fermette" th:href="@{/activities}">
                        Réserver
                    </a>
                </li>
            </ul>
        </div>

    </div>
</nav>

</body>
</html>
