<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    Fragment navbar
    Paramètre active : nom de la page courante
    ex: navbar('home'), navbar('gites'), navbar('activities')
-->
<nav th:fragment="navbar(active)"
     class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <!-- Logo alpaga dans un cercle + nom de la fermette -->
        <a class="navbar-brand" th:href="@{/}">
            <span style="width:32px; height:32px; background:#4A5D3F;
                         border-radius:50%; display:inline-flex;
                         align-items:center; justify-content:center;
                         color:#F6F1E7; flex-shrink:0; margin-right:8px;">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"
                     width="20" height="20" aria-hidden="true">
                    <g fill="currentColor">
                        <path d="M52 8 C50 8 49 11 50 15 L53 24 L58 16 C59 12 56 8 52 8 Z"/>
                        <path d="M62 10 C60 10 59 13 60 17 L62 25 L67 18 C68 14 66 10 62 10 Z"/>
                        <ellipse cx="58" cy="28" rx="11" ry="10"/>
                        <path d="M50 35 C46 42 46 52 52 58 L60 60 C58 50 60 40 64 33 C60 30 54 30 50 35 Z"/>
                        <ellipse cx="42" cy="66" rx="26" ry="17"/>
                        <rect x="22" y="76" width="6" height="18" rx="2"/>
                        <rect x="34" y="78" width="6" height="18" rx="2"/>
                        <rect x="48" y="78" width="6" height="18" rx="2"/>
                        <rect x="58" y="76" width="6" height="18" rx="2"/>
                        <path d="M68 60 C74 58 76 64 71 68 C68 70 65 67 68 60 Z"/>
                    </g>
                </svg>
            </span>
            Fermette des Trois Tilleuls
        </a>

        <!-- Bouton hamburger mobile -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navMenu"
                aria-controls="navMenu"
                aria-expanded="false"
                aria-label="Ouvrir la navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Liens de navigation -->
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'home'} ? ' active'"
                       th:href="@{/}">
                        Accueil
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'gites'} ? ' active'"
                       th:href="@{/gites}">
                        Nos gîtes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'activities'} ? ' active'"
                       th:href="@{/activities}">
                        Activités
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'shop'} ? ' active'"
                       th:href="@{/shop}">
                        Magasin
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'contact'} ? ' active'"
                       th:href="@{/contact}">
                        Contact
                    </a>
                </li>
                <!-- Bouton Réserver -->
                <li class="nav-item ms-lg-2">
                    <a class="btn btn-fermette" th:href="@{/activities}">
                        Réserver
                    </a>
                </li>
            </ul>
        </div>

    </div>
</nav>

</body>
</html>
