<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<footer th:fragment="footer" class="footer-fermette mt-5 py-4">
    <div class="container">
        <div class="row gy-4">

            <!-- Présentation -->
            <div class="col-12 col-md-4">
                <h5>🌿 Fermette des Trois Tilleuls</h5>
                <p>Gîtes au calme, activités en plein air
                    et produits de la ferme.</p>
            </div>

            <!-- Navigation -->
            <div class="col-12 col-md-4">
                <h5>Navigation</h5>
                <ul class="list-unstyled">
                    <li><a th:href="@{/gites}">Nos gîtes</a></li>
                    <li><a th:href="@{/activities}">Activités</a></li>
                    <li><a th:href="@{/shop}">Magasin</a></li>
                    <li><a th:href="@{/#contact}">Contact</a></li>
                </ul>
            </div>

            <!-- Contact -->
            <div class="col-12 col-md-4">
                <h5>Contact</h5>
                <p>
                    📍 <span th:text="${fermette.adresse}"></span><br/>
                    📞 <span th:text="${fermette.telephone}"></span><br/>
                    ✉️ <span th:text="${fermette.email}"></span><br/>
                    🕘 <span th:text="${fermette.horaires}"></span>
                </p>
            </div>

        </div>
        <hr/>
        <!-- Copyright -->
        <p class="text-center mb-0">
            &copy; 2026 Fermette des Trois Tilleuls
            — Tous droits réservés
        </p>
        <p class="text-center mt-1">
            <a th:href="@{/admin/login}" class="footer-admin-link">
                Espace réservé
            </a>
        </p>
    </div>
</footer>

</body>
</html>
