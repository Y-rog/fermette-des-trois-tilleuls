<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Le magasin')}"></head>

<body>

<nav th:replace="~{fragments/navbar :: navbar('shop')}"></nav>

<main>
    <div class="container py-4">

        <!-- Hero magasin -->
        <div class="row align-items-center g-4 mb-5">
            <div class="col-12 col-md-6">
                <span class="section-tag">Vente directe</span>
                <h1 class="mb-3">Le magasin de la fermette</h1>
                <p class="mb-4">
                    Découvrez nos produits fermiers en vente directe :
                    fromages, laine d'alpaga, confitures et bien plus.
                    Venez nous rendre visite !
                </p>
                <p class="mb-1">
                    <strong>Horaires :</strong> <span th:text="${fermette.horairesBoutique}"></span>
                </p>
                <p class="mb-1">
                    <strong>Adresse :</strong> <span th:text="${fermette.adresse}"></span>
                </p>
                <p class="mb-3">
                    <strong>Accès :</strong> parking gratuit sur place
                </p>
                <a href="#" class="btn btn-fermette">Itinéraire</a>
            </div>
            <div class="col-12 col-md-6">
                <img th:src="@{/img/shop/magasin-1.jpg}"
                     class="img-hero"
                     alt="Le magasin de la fermette"/>
            </div>
        </div>
    </div>
</main>



<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
