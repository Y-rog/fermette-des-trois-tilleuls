<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Page introuvable')}"></head>

<body>

<nav th:replace="~{fragments/navbar :: navbar('')}"></nav>

<div class="container py-5 d-flex justify-content-center">
    <div class="card p-5 text-center" style="max-width: 540px; width: 100%;">

        <!-- Icône 404 -->
        <div class="mx-auto mb-3 d-flex align-items-center
                    justify-content-center rounded-circle"
             style="width:80px; height:80px;
                    background: var(--ff-sable);
                    color: var(--ff-brun-light);
                    font-size:2rem; font-weight:700;">
            404
        </div>

        <h1 class="h3 mb-2">Page introuvable</h1>

        <p class="text-muted mb-4"
           th:text="${message} ?: 'La page que vous cherchez n\'existe pas ou a été déplacée.'">
        </p>

        <div class="d-flex justify-content-center gap-3 flex-wrap">
            <a th:href="@{/}" class="btn btn-outline-secondary">
                Retour à l'accueil
            </a>
            <a th:href="@{/gites}" class="btn btn-fermette">
                Voir nos gîtes
            </a>
        </div>

    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
