<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Dashboard Admin')}"></head>

<body>

<nav th:replace="~{fragments/admin/admin-navbar :: adminNavbar}"></nav>

<div class="container py-4">

    <!-- ===== Messages flash (succès / erreur) ===== -->
    <div th:if="${success}" class="alert alert-success mb-3">
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger mb-3">
        <span th:text="${error}"></span>
    </div>

    <!-- ===== Header + Navigation ===== -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Tableau de bord</h1>
        <div class="d-flex flex-wrap gap-2">
            <a th:href="@{/admin/gites}"
               class="btn btn-outline-secondary btn-sm">
                🏠 Gîtes
            </a>
            <a th:href="@{/admin/activities}"
               class="btn btn-outline-secondary btn-sm">
                🐑 Activités
            </a>
            <a th:href="@{/admin/infos}"
               class="btn btn-outline-secondary btn-sm">
                ⚙️ Infos
            </a>
            <a th:href="@{/admin/history}"
               class="btn btn-outline-secondary btn-sm">
                📋 Historique
            </a>
            <form th:action="@{/admin/archive}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">
                    🗄️ Archiver
                </button>
            </form>
        </div>
    </div>

    <!-- ===== Calendrier multi-gîtes ===== -->
    <h2 class="h5 mb-3">📅 Vue d'ensemble des disponibilités</h2>
    <div th:replace="~{fragments/admin/calendar :: calendar(${multiCalendar})}"></div>

    <!-- ===== Nouvelle réservation téléphonique ===== -->
    <div th:replace="~{fragments/admin/gite-form :: phoneBooking(${gites})}"></div>

    <!-- ===== Réservations gîtes ===== -->
    <div th:replace="~{fragments/admin/gite-bookings :: giteBookings(${giteBookings})}"></div>

    <!-- ===== Réservations activités ===== -->
    <div th:replace="~{fragments/admin/activity-bookings :: activityBookings(${activityBookings})}"></div>

</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
