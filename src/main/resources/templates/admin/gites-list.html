<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Gestion des gîtes')}"></head>

<body>

<nav th:replace="~{fragments/admin-navbar :: adminNavbar}"></nav>

<div class="container py-4">

    <!-- Message d'erreur (ex: suppression refusée) -->
    <div th:if="${error}" class="alert alert-danger mb-3">
        <span th:text="${error}"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Gestion des gîtes</h1>
            <a th:href="@{/admin/dashboard}" class="text-muted small">
                ← Retour au dashboard
            </a>
        </div>
        <a th:href="@{/admin/gites/new}" class="btn btn-fermette">
            + Ajouter un gîte
        </a>
    </div>

    <div class="row g-4">
        <div class="col-12 col-md-6" th:each="gite : ${gites}">
            <div class="card p-3">
                <h3 class="h5 mb-1" th:text="${gite.name()}"></h3>
                <p class="small text-muted mb-2">
                    📍 <span th:text="${gite.location()}"></span>
                    · <span th:text="${gite.capacity()}"></span> pers.
                    · <span th:text="${gite.bedrooms()}"></span> chambres
                </p>
                <p class="small mb-3" th:text="${gite.description()}"></p>

                <div class="d-flex gap-2">
                    <a th:href="@{/admin/gites/{id}/edit(id=${gite.id()})}"
                       class="btn btn-outline-secondary btn-sm">
                        Modifier
                    </a>
                    <a th:href="@{/admin/gites/{id}/availabilities(id=${gite.id()})}"
                       class="btn btn-outline-secondary btn-sm">
                        📅 Disponibilités
                    </a>
                    <form th:action="@{/admin/gites/{id}/delete(id=${gite.id()})}" method="post" class="d-inline">
                        <a th:href="@{/admin/gites/{id}/delete-confirm(id=${gite.id()})}"
                           class="btn btn-outline-danger btn-sm">
                            Supprimer
                        </a>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(gites)}" class="col-12">
            <p class="text-muted text-center py-4">
                Aucun gîte pour le moment.
            </p>
        </div>
    </div>

</div>


<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
