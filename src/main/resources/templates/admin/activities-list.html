<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Gestion des activités')}"></head>

<body>

<nav th:replace="~{fragments/admin/admin-navbar :: adminNavbar}"></nav>

<div class="container py-4">

    <!-- Message d'erreur (ex: suppression refusée) -->
    <div th:if="${error}" class="alert alert-danger mb-3">
        <span th:text="${error}"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Gestion des activités</h1>
            <a th:href="@{/admin/dashboard}" class="text-muted small">
                ← Retour au dashboard
            </a>
        </div>
        <a th:href="@{/admin/activities/new}" class="btn btn-fermette">
            + Ajouter une activité
        </a>
    </div>

    <div class="row g-4">
        <div class="col-12 col-md-6" th:each="activity : ${activities}">
            <div class="card p-3">
                <h3 class="h5 mb-1" th:text="${activity.name()}"></h3>
                <p class="small text-muted mb-2">
                    📅 <span th:text="${activity.date()}"></span>
                    · 🕐 <span th:text="${activity.time()}"></span>
                </p>
                <p class="small mb-3" th:text="${activity.description()}"></p>

                <div class="d-flex gap-2">
                    <a th:href="@{/admin/activities/{id}/edit(id=${activity.id()})}"
                       class="btn btn-outline-secondary btn-sm">
                        Modifier
                    </a>
                    <a th:href="@{/admin/activities/{id}/duplicate(id=${activity.id()})}"
                       class="btn btn-outline-secondary btn-sm">
                        📋 Dupliquer
                    </a>
                    <form th:action="@{/admin/activities/{id}/delete(id=${activity.id()})}"
                          method="post" class="d-inline">
                        <a th:href="@{/admin/activities/{id}/delete-confirm(id=${activity.id()})}"
                           class="btn btn-outline-danger btn-sm">
                            Supprimer
                        </a>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(activities)}" class="col-12">
            <p class="text-muted text-center py-4">
                Aucune activité pour le moment.
            </p>
        </div>
    </div>

</div>


<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
