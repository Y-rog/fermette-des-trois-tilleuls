<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${isEdit} ? 'Modifier le gîte' : 'Nouveau gîte')}"></head>

<body>

<nav th:replace="~{fragments/admin/admin-navbar :: adminNavbar}"></nav>

<div class="container py-4" style="max-width: 640px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0" th:text="${isEdit} ? 'Modifier le gîte' : 'Nouveau gîte'"></h1>
        <a th:href="@{/admin/gites}" class="btn btn-outline-secondary btn-sm">
            ← Retour
        </a>
    </div>

    <div class="card p-4">

        <!-- ===== Formulaire ÉDITION ===== -->
        <form th:if="${isEdit}"
              th:action="@{/admin/gites/{id}/edit(id=${giteId})}"
              th:object="${giteForm}"
              method="post"
              enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label fw-bold">Nom</label>
                <input type="text" class="form-control"
                       th:field="*{name}" required/>
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Localisation</label>
                <input type="text" class="form-control"
                       th:field="*{location}" required/>
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('location')}"
                     th:errors="*{location}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Description</label>
                <textarea class="form-control" rows="4"
                          th:field="*{description}"></textarea>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label fw-bold">Capacité (pers.)</label>
                    <input type="number" class="form-control"
                           th:field="*{capacity}" min="1" required/>
                </div>
                <div class="col-6">
                    <label class="form-label fw-bold">Chambres</label>
                    <input type="number" class="form-control"
                           th:field="*{bedrooms}" min="1" required/>
                </div>
            </div>

            <!-- Photo vitrine -->
            <div class="mb-4">
                <label class="form-label fw-bold">Photo vitrine (optionnel)</label>
                <input type="file" class="form-control"
                       name="photoVitrine"
                       accept="image/jpeg,image/png,image/webp,image/gif"/>
                <!-- Affiche la photo actuelle si elle existe -->
                <div th:if="${giteForm.photoUrl != null and !giteForm.photoUrl.isEmpty()}"
                     class="mt-2">
                    <img th:src="${giteForm.photoUrl}" class="img-thumbnail"
                         style="height: 80px; object-fit: cover;"
                         alt="Photo vitrine actuelle"/>
                    <small class="text-muted d-block">Photo actuelle</small>
                </div>
            </div>

            <button type="submit" class="btn btn-fermette w-100">
                Enregistrer les modifications
            </button>
        </form>

        <!-- ===== Gestion des photos (uniquement en édition) ===== -->
        <div th:if="${isEdit}" class="mt-4 pt-4" style="border-top: 1px solid var(--bs-border-color);">
            <h3 class="h5 mb-3">Photos du gîte</h3>

            <!-- Messages succès/erreur -->
            <div th:if="${success}" class="alert alert-success mb-3">
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger mb-3">
                <span th:text="${error}"></span>
            </div>

            <!-- Formulaire upload fichier -->
            <form th:action="@{/admin/gites/{id}/photos/upload(id=${giteId})}"
                  method="post"
                  enctype="multipart/form-data"
                  class="d-flex gap-2 mb-4">
                <input type="file" class="form-control"
                       name="file"
                       accept="image/jpeg,image/png,image/webp,image/gif"
                       required/>
                <button type="submit" class="btn btn-fermette">
                    Ajouter
                </button>
            </form>

            <!-- Galerie des photos existantes -->
            <div class="row g-3" th:if="${not #lists.isEmpty(photos)}">
                <div class="col-6 col-md-4" th:each="photo : ${photos}">
                    <div class="position-relative">
                        <img th:src="${photo.url()}" class="img-fluid rounded"
                             style="height: 120px; width: 100%; object-fit: cover;"
                             alt="Photo du gîte"/>
                        <form th:action="@{/admin/gites/{giteId}/photos/{photoId}/delete(giteId=${giteId}, photoId=${photo.id()})}"
                              method="post"
                              class="position-absolute top-0 end-0 m-1">
                            <button type="submit"
                                    class="btn btn-danger btn-sm"
                                    style="padding: 2px 8px; font-size: 0.75rem;">
                                ✕
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <p th:if="${#lists.isEmpty(photos)}" class="text-muted small mb-0">
                Aucune photo ajoutée pour le moment.
            </p>
        </div>

        <!-- ===== Formulaire CRÉATION ===== -->
        <form th:unless="${isEdit}"
              th:action="@{/admin/gites/new}"
              th:object="${giteForm}"
              method="post"
              enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label fw-bold">Nom</label>
                <input type="text" class="form-control"
                       th:field="*{name}" required/>
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Localisation</label>
                <input type="text" class="form-control"
                       th:field="*{location}" required/>
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('location')}"
                     th:errors="*{location}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Description</label>
                <textarea class="form-control" rows="4"
                          th:field="*{description}"></textarea>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label fw-bold">Capacité (pers.)</label>
                    <input type="number" class="form-control"
                           th:field="*{capacity}" min="1" required/>
                </div>
                <div class="col-6">
                    <label class="form-label fw-bold">Chambres</label>
                    <input type="number" class="form-control"
                           th:field="*{bedrooms}" min="1" required/>
                </div>
            </div>

            <!-- Photo vitrine -->
            <div class="mb-4">
                <label class="form-label fw-bold">Photo vitrine (optionnel)</label>
                <input type="file" class="form-control"
                       name="photoVitrine"
                       accept="image/jpeg,image/png,image/webp,image/gif"/>
            </div>

            <button type="submit" class="btn btn-fermette w-100">
                Créer le gîte
            </button>
        </form>

    </div>

</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
